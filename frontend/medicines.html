<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Medicines - SmartCare</title>
  <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
  <div class="sidebar">
    <h2>SmartCare</h2>
    <a href="/frontend/index.html">Dashboard</a>
    <a href="/frontend/medicines.html">Medicines</a>
  </div>
  <div class="main">
    <div class="topnav"><h3>Medicines</h3></div>
    <div id="medsTable" class="card"></div>
  </div>
  <script src="/frontend/assets/js/app.js"></script>
  <script>
    async function loadMeds(){
      try{
        const data = await apiFetch('/medicines');
        renderTable('#medsTable', data, [
          {label:'ID', key:'medicine_id'},{label:'Name', key:'medicine_name'},{label:'Qty', key:'quantity'},{label:'Price', key:'unit_price'},{label:'Expiry', key:'expiry_date'}
        ]);
      }catch(err){console.error(err);}
    }
    loadMeds();
  </script>
</body>
</html>
