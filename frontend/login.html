<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartCare - Login</title>
  <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
  <div class="container" style="max-width:420px;margin-top:80px">
    <div class="card">
      <h2 style="color:var(--blue)">SmartCare Login</h2>
      <form id="loginForm">
        <div class="row"><input type="email" id="email" placeholder="Email" required></div>
        <div class="row" style="margin-top:8px"><input type="password" id="password" placeholder="Password" required></div>
        <div style="margin-top:12px"><button class="btn" type="submit">Login</button>
        <a href="/frontend/register.html" style="margin-left:8px">Register</a></div>
      </form>
    </div>
  </div>
  <script src="/frontend/assets/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try{
        const res = await fetch('http://localhost:5000/api/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data = await res.json();
        if (!res.ok) return alert(data.message || 'Login failed');
        localStorage.setItem('sc_token', data.token);
        window.location = '/frontend/index.html';
      }catch(err){alert(err.message)}
    });
  </script>
</body>
</html>
