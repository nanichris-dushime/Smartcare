<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Doctors - SmartCare</title>
  <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
  <div class="sidebar">
    <h2>SmartCare</h2>
    <a href="/frontend/index.html">Dashboard</a>
    <a href="/frontend/patients.html">Patients</a>
    <a href="/frontend/doctors.html">Doctors</a>
  </div>
  <div class="main">
    <div class="topnav"><h3>Doctors</h3><div><button class="btn" id="newDoctorBtn">New Doctor</button></div></div>
    <div id="doctorsTable" class="card"></div>
  </div>

  <script src="/frontend/assets/js/app.js"></script>
  <script>
    async function loadDoctors(){
      try{
        const data = await apiFetch('/doctors');
        renderTable('#doctorsTable', data, [
          {label:'ID', key:'doctor_id'},{label:'Name', key:'full_name'},{label:'Specialization', key:'specialization'},{label:'Department', key:'department_name'},{label:'Phone', key:'phone'}
        ]);
      }catch(err){console.error(err);}
    }
    loadDoctors();
  </script>
</body>
</html>
